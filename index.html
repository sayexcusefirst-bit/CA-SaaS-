<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxAI | Chartered Accountants SaaS</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- SheetJS for Export/Import -->

  <!-- React & ReactDOM -->

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Identity -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="root"></div>

  <!-- Main logic -->
  <script type="text/babel">
const { useState, useEffect, createContext, useContext } = React;

// --- Contexts ---
const AuthContext = createContext();
const ClientContext = createContext();

// --- Icons (Inlined for reliability without bundler) ---

  CheckCircle: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,

// --- Components ---

function LoginScreen() {
  const { login } = useContext(AuthContext);
  const [isSignup, setIsSignup] = useState(false);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [errorMsg, setErrorMsg] = useState('');

  useEffect(() => {
    fetch('/api/v1/config').then(r=>r.json()).then(d => {
        if (d.google_client_id && window.google) {
            window.google.accounts.id.initialize({
                client_id: d.google_client_id,
                callback: handleGoogleResponse
            });
            window.google.accounts.id.renderButton(
                document.getElementById("googleSignInDiv"),
                { theme: "outline", size: "large", width: "100%" }
            );
        }
    }).catch(e=>console.log("Config fetch error"));
  }, []);

  const handleGoogleResponse = async (response) => {
    try {
        const res = await fetch('/api/v1/auth/google', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (res.ok) {
            login(data.user, data.token);
        } else {
            setErrorMsg(data.msg || "Google login failed");
        }
    } catch(e) {
        setErrorMsg("Network error during Google login");
    }
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setErrorMsg('');
    const endpoint = isSignup ? '/api/v1/auth/signup' : '/api/v1/auth/login';
    const payload = isSignup ? { name, email, password } : { email, password };
    
    try {
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
            login(data.user, data.token);
        } else {
            setErrorMsg(data.msg || "Authentication failed.");
        }
    } catch (e) {
        setErrorMsg("Network error.");
    }
  };

  return (
    <div className="auth-wrapper">
      <div className="auth-card animate-fade-in">
        <div className="auth-header">
          <h1><Icons.Shield /> TaxAI</h1>
          <p style={{ color: 'var(--text-muted)' }}>Premium SaaS for Indian Chartered Accountants</p>
        </div>
        
        {errorMsg && <div style={{ color: '#FCA5A5', background: 'rgba(252, 165, 165, 0.1)', padding: '0.75rem', borderRadius: '0.375rem', marginBottom: '1rem', textAlign: 'center', fontSize: '0.875rem' }}>{errorMsg}</div>}
        
        <form onSubmit={handleSubmit}>
          {isSignup && (
            <div className="form-group">
              <label className="form-label">Full Name</label>
              <input 
                type="text" 
                className="form-input" 
                placeholder="CA. John Doe" 
                value={name}
                onChange={(e) => setName(e.target.value)}
                required 
              />
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Email Address</label>
            <input 
              type="email" 
              className="form-input" 
              placeholder="ca@firm.com" 
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              required 
            />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input 
              type="password" 
              className="form-input" 
              placeholder="••••••••" 
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              required 
            />
          </div>
          <button type="submit" className="btn btn-primary" style={{ width: '100%', padding: '0.75rem', marginBottom: '1rem' }}>
            {isSignup ? "Create Secure Account" : "Sign In to Workspace"}
          </button>
        </form>
        
        <div style={{ textAlign: 'center', marginBottom: '1.5rem' }}>
            <span style={{ fontSize: '0.875rem', color: 'var(--text-muted)', cursor: 'pointer', textDecoration: 'underline' }} onClick={() => setIsSignup(!isSignup)}>
                {isSignup ? "Already have an account? Sign In" : "New CA? Create Account"}
            </span>
        </div>
        
        <div style={{ display: 'flex', alignItems: 'center', margin: '1rem 0' }}>
            <div style={{ flex: 1, height: '1px', background: 'var(--border-color)' }}></div>
            <span style={{ padding: '0 1rem', fontSize: '0.875rem', color: 'var(--text-muted)' }}>OR</span>
            <div style={{ flex: 1, height: '1px', background: 'var(--border-color)' }}></div>
        </div>
        
        <div id="googleSignInDiv" style={{ display: 'flex', justifyContent: 'center' }}></div>
      </div>
    </div>
  );
}

function Sidebar({ currentView, setCurrentView }) {
  const { logout } = useContext(AuthContext);

  const menuItems = [
    { id: 'dashboard', label: 'Dashboard Overview', icon: Icons.PieChart },
    { id: 'upload', label: 'Document Upload Hub', icon: Icons.Upload },
    { id: 'recon', label: 'AI Reconciliation (GSTR)', icon: Icons.FileText },
    { id: 'clients', label: 'Client Directory', icon: Icons.Users },
    { id: 'settings', label: 'Firm Settings', icon: Icons.Settings },
  ];

  return (
    <div className="sidebar">
      <div className="sidebar-header">
        <Icons.Shield /> TaxAI Hub
      </div>
      <div className="sidebar-nav">
        {menuItems.map(item => {
          const Icon = item.icon;
          return (
             <div 
               key={item.id} 
               className={`nav-item ${currentView === item.id ? 'active' : ''}`}
               onClick={() => setCurrentView(item.id)}
             >
               <Icon /> {item.label}
             </div>
          )
        })}
      </div>
      <div className="sidebar-nav" style={{ flex: 'none', borderTop: '1px solid rgba(255,255,255,0.1)' }}>
        <div className="nav-item" onClick={logout} style={{ color: '#FCA5A5' }}>
          <Icons.LogOut /> Sign Out
        </div>
      </div>
    </div>
  );
}

function Topbar() {
  const { clients, activeClient, setActiveClient, refreshClients } = useContext(ClientContext);
  const { user, token } = useContext(AuthContext);
  const [showAddModal, setShowAddModal] = useState(false);
  const [newClientName, setNewClientName] = useState('');
  const [newClientGstin, setNewClientGstin] = useState('');

  const handleAddClient = async (e) => {
      e.preventDefault();
      try {
          const res = await fetch('/api/v1/clients', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
              body: JSON.stringify({ name: newClientName, gstin: newClientGstin })
          });
          if (res.ok) {
              await refreshClients();
              setShowAddModal(false);
              setNewClientName('');
              setNewClientGstin('');
          } else {
              alert("Failed to add client.");
          }
      } catch(e) {
          alert("Network error.");
      }
  };

  return (
    <div className="topbar">
      <div className="client-selector-container">
        <span style={{ fontSize: '0.875rem', fontWeight: 500, color: 'var(--text-muted)' }}>Context:</span>
        {clients.length > 0 ? (
            <select 
              className="client-select" 
              value={activeClient?.id || ""}
              onChange={(e) => setActiveClient(clients.find(c => c.id === e.target.value))}
            >
              {clients.map(client => (
                <option key={client.id} value={client.id}>
                  {client.name} ({client.gstin})
                </option>
              ))}
            </select>
        ) : (
            <span style={{ fontSize: '0.875rem', color: '#FCA5A5' }}>No Clients Configured</span>
        )}
        <button className="btn btn-secondary" style={{ padding: '0.4rem 0.75rem', marginLeft: '0.5rem' }} onClick={() => setShowAddModal(true)}>+ Add Client</button>
      </div>
      
      {showAddModal && (
          <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}>
              <div className="card animate-fade-in" style={{ width: '400px' }}>
                  <div className="card-header"><div className="card-title">Add New Client</div></div>
                  <form onSubmit={handleAddClient}>
                      <div className="form-group">
                          <label className="form-label">Client Name</label>
                          <input type="text" className="form-input" value={newClientName} onChange={e=>setNewClientName(e.target.value)} required />
                      </div>
                      <div className="form-group">
                          <label className="form-label">GSTIN</label>
                          <input type="text" className="form-input" value={newClientGstin} onChange={e=>setNewClientGstin(e.target.value)} required />
                      </div>
                      <div style={{ display: 'flex', gap: '1rem', marginTop: '1.5rem' }}>
                          <button type="button" className="btn btn-secondary" style={{ flex: 1 }} onClick={() => setShowAddModal(false)}>Cancel</button>
                          <button type="submit" className="btn btn-primary" style={{ flex: 1 }}>Save Client</button>
                      </div>
                  </form>
              </div>
          </div>
      )}

      <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
        <span style={{ fontSize: '0.875rem', fontWeight: 500 }}>{user.name}</span>
        <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: 'var(--primary-color)', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 'bold', textTransform: 'uppercase' }}>
          {user.name.substring(0, 2)}
        </div>
      </div>
    </div>
  );
}

function UploadHub({ onUploadComplete }) {
  const { activeClient } = useContext(ClientContext);
  const { token } = useContext(AuthContext);
  const [dragActive, setDragActive] = useState(false);
  const [files, setFiles] = useState([]);
  const [rawFiles, setRawFiles] = useState([]);
  const [isProcessing, setIsProcessing] = useState(false);

  const handleDrag = function(e) {
    e.preventDefault();
    e.stopPropagation();
    if (e.type === "dragenter" || e.type === "dragover") {
      setDragActive(true);
    } else if (e.type === "dragleave") {
      setDragActive(false);
    }
  };

  const handleDrop = function(e) {
    e.preventDefault();
    e.stopPropagation();
    setDragActive(false);
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      handleFiles(e.dataTransfer.files);
    }
  };

  const handleChange = function(e) {
    e.preventDefault();
    if (e.target.files && e.target.files[0]) {
      handleFiles(e.target.files);
    }
  };

  const handleFiles = (newFiles) => {
    const fileArray = Array.from(newFiles).map(f => ({ name: f.name, size: (f.size / 1024 / 1024).toFixed(2) + ' MB' }));
    setFiles([...files, ...fileArray]);
    setRawFiles([...rawFiles, ...Array.from(newFiles)]);
  };

  const startAIProcessing = async () => {
    setIsProcessing(true);
    const formData = new FormData();
    rawFiles.forEach(file => formData.append("files", file));

    try {
        await fetch(`/api/v1/reconciliation/process/${activeClient.id}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        setIsProcessing(false);
        setFiles([]);
        setRawFiles([]);
        onUploadComplete();
    } catch (e) {
        alert("Failed to upload files to backend API.");
        setIsProcessing(false);
    }
  };

  if (isProcessing) {
    return (
      <div className="card animate-fade-in processing-view">
         <Icons.Loader />
         <h2>Backed Engine is parsing your documents...</h2>
         <p style={{ color: 'var(--text-muted)' }}>Using Pandas and PDFPlumber to extract text and generate data.</p>
      </div>
    );
  }

  return (
    <div className="card animate-fade-in">
      <div className="card-header">
        <div className="card-title"><Icons.Upload /> Upload Documents for Reconciliation</div>
      </div>
      <p style={{ marginBottom: '1.5rem', color: 'var(--text-muted)', fontSize: '0.9rem' }}>
        Upload GSTR-2B JSON/Excel, GSTR-3B returns, or Bank Statements (CSV/PDF) here. Free backend OCR will securely read them locally.
      </p>

      <div 
        className={`upload-zone ${dragActive ? 'active' : ''}`}
        onDragEnter={handleDrag}
        onDragLeave={handleDrag}
        onDragOver={handleDrag}
        onDrop={handleDrop}
      >
        <div className="upload-icon"><Icons.FileText /></div>
        <div className="upload-text">Drag and drop files here to upload</div>
        <div className="upload-subtext">Supported formats: .csv, .xlsx, .json, .pdf (Bank Statements)</div>
        <input 
             type="file" 
             multiple 
             className="upload-input" 
             onChange={handleChange} 
             accept=".csv,.xlsx,.json,.pdf" 
         />
      </div>

      {files.length > 0 && (
        <div style={{ marginTop: '2rem' }}>
          <h4>Staged Files</h4>
          <ul style={{ listStyle: 'none', padding: 0, marginTop: '0.5rem', marginBottom: '1.5rem' }}>
            {files.map((file, i) => (
              <li key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '0.75rem', background: 'var(--bg-color)', border: '1px solid var(--border-color)', borderRadius: 'var(--radius-md)', marginBottom: '0.5rem' }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}><Icons.FileText /> {file.name}</span>
                <span style={{ color: 'var(--text-muted)', fontSize: '0.875rem' }}>{file.size}</span>
              </li>
            ))}
          </ul>
          <button className="btn btn-primary" onClick={startAIProcessing}>
            <Icons.CheckCircle /> Process & Run AI Reconciliation
          </button>
        </div>
      )}
    </div>
  );
}

function ReconDashboard() {
  const { activeClient } = useContext(ClientContext);
  const { token } = useContext(AuthContext);
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!activeClient) return;
    setLoading(true);
    fetch(`/api/v1/reconciliation/results/${activeClient.id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(res => res.json())
    .then(resData => {
        setData(resData.results);
        setLoading(false);
    })
    .catch(err => {
        console.error(err);
        setLoading(false);
    });
  }, [activeClient, token]);

  const getBadgeClass = (status) => {
    if (status === 'Matched') return 'badge-success';
    if (status === 'Mismatch' || status === 'Missing in 3B' || status === 'Anomaly') return 'badge-danger';
    return 'badge-warning';
  };

  const exportToExcel = () => {
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Reconciliation");
    XLSX.writeFile(wb, `${activeClient.name.replace(/ /g, '_')}_GSTR_Reconciliation.xlsx`);
  };

  if (loading) return <div>Loading records securely from backend...</div>;

  const mismatches = data.filter(d => d.status === 'Mismatch' || d.status === 'Missing in 3B').length;
  const anomalies = data.filter(d => d.status === 'Anomaly').length;

  return (
    <div className="animate-fade-in">
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-icon primary"><Icons.FileText /></div>
          <div className="stat-details">
            <h3>Total Invoices Processed</h3>
            <p>{data.length * 12}</p>
          </div>
        </div>
        <div className="stat-card">
          <div className="stat-icon danger"><Icons.AlertTriangle /></div>
          <div className="stat-details">
            <h3>GSTR Mismatches</h3>
            <p>{mismatches}</p>
          </div>
        </div>
        <div className="stat-card">
          <div className="stat-icon warning"><Icons.Shield /></div>
          <div className="stat-details">
            <h3>Bank Anomalies</h3>
            <p>{anomalies}</p>
          </div>
        </div>
      </div>

      <div className="card">
         <div className="card-header">
           <div className="card-title"><Icons.CheckCircle /> AI Reconciliation Results ({activeClient.name})</div>
           <button className="btn btn-secondary" onClick={exportToExcel}>
             <Icons.Download /> Export to Excel
           </button>
         </div>
         
         <div className="table-container">
           <table className="data-table">
             <thead>
               <tr>
                 <th>Type</th>
                 <th>Invoice / Ref</th>
                 <th>Vendor / Details</th>
                 <th>GSTR-2B Amt</th>
                 <th>GSTR-3B Amt</th>
                 <th>Status</th>
               </tr>
             </thead>
             <tbody>
               {data.map(row => (
                 <tr key={row.id}>
                   <td><strong>{row.type}</strong></td>
                   <td>{row.invoice}</td>
                   <td>{row.vendor || row.details}</td>
                   <td>{row.gstr2b_amount ? `₹${row.gstr2b_amount.toLocaleString()}` : '-'}</td>
                   <td>{row.gstr3b_amount !== null && row.gstr3b_amount !== undefined ? `₹${row.gstr3b_amount.toLocaleString()}` : '-'}</td>
                   <td>
                     <span className={`badge ${getBadgeClass(row.status)}`}>{row.status}</span>
                   </td>
                 </tr>
               ))}
               {data.length === 0 && (
                   <tr>
                       <td colSpan="6" style={{textAlign: 'center', padding: '2rem'}}>No records found for this client. Please upload documents.</td>
                   </tr>
               )}
             </tbody>
           </table>
         </div>
      </div>
    </div>
  );
}

function MainLayout() {
  const [currentView, setCurrentView] = useState('dashboard');

  return (
    <div className="app-container">
      <Sidebar currentView={currentView} setCurrentView={setCurrentView} />
      <div className="main-content">
        <Topbar />
        <div className="content-area">
          {currentView === 'dashboard' && (
            <div className="animate-fade-in">
              <h1>Welcome back, {user.name.split(' ')[0]}!</h1>
              <p style={{ color: 'var(--text-muted)', marginBottom: '2rem' }}>Here's the overview for your active client context.</p>
              {activeClient ? <ReconDashboard /> : (
                  <div className="card" style={{ textAlign: 'center', padding: '3rem' }}>
                      <Icons.Users />
                      <h3 style={{ marginTop: '1rem' }}>No Clients Yet</h3>
                      <p style={{ color: 'var(--text-muted)' }}>Add your first client using the button in the top bar to initialize your workspace.</p>
                  </div>
              )}
            </div>
          )}
          {currentView === 'upload' && activeClient && (
            <UploadHub onUploadComplete={() => setCurrentView('recon')} />
          )}
          {currentView === 'recon' && activeClient && (
            <ReconDashboard />
          )}
          {(currentView === 'clients' || currentView === 'settings') && (
            <div className="card animate-fade-in">
              <div className="card-header">
                <div className="card-title">Module Under Construction</div>
              </div>
              <p>This section is part of the extended SaaS functionality.</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(null);
  const [clients, setClients] = useState([]);
  const [activeClient, setActiveClient] = useState(null);

  useEffect(() => {
    // Check local storage for mock session
    const mockSession = localStorage.getItem('ca_session');
    const savedToken = localStorage.getItem('ca_token');
    
    if (mockSession && savedToken) {
        setUser(JSON.parse(mockSession));
        setToken(savedToken);
    }
  }, []);

  const fetchClients = () => {
      if(token) {
          return fetch('/api/v1/clients', {
              headers: { 'Authorization': `Bearer ${token}` }
          })
            .then(res => {
                if(res.status === 401 || res.status === 422) throw new Error("Unauthorized");
                return res.json();
            })
            .then(data => {
                setClients(data.clients);
                // Maintain active client selection if possible
                if (data.clients.length > 0) {
                     setActiveClient(prev => prev ? (data.clients.find(c => c.id === prev.id) || data.clients[0]) : data.clients[0]);
                } else {
                     setActiveClient(null);
                }
            })
            .catch(err => {
                console.error("Auth expired", err);
                logout();
            });
      }
      return Promise.resolve();
  };

  useEffect(() => {
      fetchClients();
  }, [token]);

  const login = (userData, accessToken) => {
    setUser(userData);
    setToken(accessToken);
    localStorage.setItem('ca_session', JSON.stringify(userData));
    localStorage.setItem('ca_token', accessToken);
  };

  const logout = () => {
    setUser(null);
    setToken(null);
    localStorage.removeItem('ca_session');
    localStorage.removeItem('ca_token');
  };

  if (!user || !token) {
    return (
      <AuthContext.Provider value={{ login }}>
        <LoginScreen />
      </AuthContext.Provider>
    );
  }
  
  // Replaced the blocking state for 0 clients so users can reach the empty dashboard
  if (clients.length === 0 && token && user && activeClient === null) {
     // Rendering layout with empty state
  } else if (!activeClient && clients.length > 0) {
      return <div>Loading Workspace...</div>;
  }

  return (
    <AuthContext.Provider value={{ user, token, logout }}>
      <ClientContext.Provider value={{ clients, activeClient, setActiveClient, refreshClients: fetchClients }}>
        <MainLayout />
      </ClientContext.Provider>
    </AuthContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
